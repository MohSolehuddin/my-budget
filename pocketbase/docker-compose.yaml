version: '3.8'

services:
  pocketbase:
    image: coollabsio/pocketbase:latest
    container_name: my-budget-pb
    ports:
      - "8091:8080"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
      - ./pb_migrations:/pb_migrations
      - ./pb_hooks:/pb_hooks
    restart: unless-stopped
    environment:
      - PB_ADMIN_EMAIL=admin@mybudget.local
      - PB_ADMIN_PASSWORD=***password***
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
