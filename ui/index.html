<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Budget</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Login / Register screen -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="logo" style="text-align:center;margin-bottom:24px;font-size:1.5rem">💰 My Budget</div>
      <div id="auth-tabs" style="display:flex;gap:0;margin-bottom:24px">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
      </div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input name="email" type="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input name="password" type="password" required autocomplete="current-password">
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button class="btn btn-primary" style="width:100%">Login</button>
      </form>
      <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Name</label>
          <input name="name" type="text" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input name="email" type="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input name="password" type="password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input name="passwordConfirm" type="password" required minlength="8" autocomplete="new-password">
        </div>
        <div id="register-error" class="form-error hidden"></div>
        <button class="btn btn-primary" style="width:100%">Register</button>
      </form>
    </div>
  </div>

  <!-- Main app (hidden until login) -->
  <div id="app-screen" class="hidden" style="display:flex;min-height:100vh">
    <nav class="sidebar">
      <div class="logo">💰 My Budget</div>
      <a href="#" data-page="summary" class="nav-link active">📊 Summary</a>
      <a href="#" data-page="transactions" class="nav-link">💸 Transactions</a>
      <a href="#" data-page="budgets" class="nav-link">🎯 Budgets</a>
      <a href="#" data-page="debts" class="nav-link">🏦 Debts</a>
      <a href="#" data-page="pockets" class="nav-link">👛 Pockets</a>
      <a href="#" data-page="categories" class="nav-link">🏷️ Categories</a>
      <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--surface2)">
        <div style="font-size:.8rem;color:var(--text2);margin-bottom:4px" id="user-display"></div>
        <button class="btn btn-sm btn-outline" onclick="logout()" style="width:100%">🚪 Logout</button>
      </div>
    </nav>
    <main id="app"></main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
